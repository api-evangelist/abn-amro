meters:
  - name: psd2_production
    description: PSD2 production access — not a metered unit; cost is regulatory (TPP licence + eIDAS) rather than per-API-call.
    unit: licence
    aggregation: count
    dimensions:
      - tpp
  - name: business_contract
    description: Business-banking contract underlying Tikkie Business and Business Account Payment usage.
    unit: contract
    aggregation: count
    dimensions:
      - customer
principles:
  - name: Visibility
    description: Track Tikkie and Business-API usage against the linked commercial banking invoice and against any TPP-side eIDAS certificate spend.
  - name: Allocation
    description: Allocate Tikkie Business cost to the merchant / payment-collection cost centre and Business Account Payment cost to corporate treasury.
  - name: Optimization
    description: Optimize by consolidating PSD2 traffic within the 4-call/day unattended AIS limit and batching payments where the underlying SEPA rail allows.
  - name: Accountability
    description: Treasury / payments leadership owns the ABN AMRO relationship; integration teams own the developer-portal credentials and certificate lifecycle.
